name: "finsight"
version: "1.0.0"
config-version: 2

# This profile is defined in profiles.yml (same folder); run dbt with
# --profiles-dir . from inside the dbt/ directory.
profile: "finsight"

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Materialization defaults per layer:
#   staging      -> view  (cheap, always reflects latest raw)
#   intermediate -> view  (feature logic, recomputed on read)
#   marts        -> table (materialized once for fast ML/serving reads)
models:
  finsight:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table
