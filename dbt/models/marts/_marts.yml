version: 2

models:
  - name: fct_daily_signals
    description: "Wide ML-ready feature table: one row per ticker per trading day."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [ticker, date]
    columns:
      - name: date
        data_tests: [not_null]
      - name: ticker
        data_tests: [not_null]
      - name: close
        data_tests: [not_null]
